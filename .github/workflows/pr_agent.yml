# .github/workflows/pr_agent.yml
name: PR Agent (via 9Router)
on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  issue_comment:

jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
    steps:
      - name: PR Agent action step
        uses: the-pr-agent/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_KEY: ${{ secrets.NINER_ROUTER_API_KEY }}
          OPENAI.API_BASE: ${{ secrets.NINER_ROUTER_BASE_URL }}  # contoh: https://your-vps.com/v1
          config.model: "cx/gpt-5.5-review"  # sesuaikan model name di 9Router
          config.fallback_models: '["ag/gemini-pro-agent"]'
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"
          github_action_config.auto_improve: "true"
