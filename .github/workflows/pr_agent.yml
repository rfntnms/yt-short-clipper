name: PR Agent (via 9Router)

on:
  pull_request:
    types: [opened, reopened, ready_for_review, review_requested]
  issue_comment:

jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
    name: Run PR Agent on every pull request, respond to user comments
    steps:
      - name: PR Agent action step
        id: pragent
        uses: the-pr-agent/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # 9Router endpoint & API key
          OPENAI_KEY: ${{ secrets.NINER_ROUTER_API_KEY }}
          OPENAI__API_BASE: ${{ secrets.NINER_ROUTER_BASE_URL }}  # e.g. https://your-vps.com/v1

          # Model config — prefix openai/ supaya litellm tau ini OpenAI-compatible
          config.model: "openai/cx/gpt-5.5-review"
          config.fallback_models: '["openai/ag/gemini-pro-agent"]'
          config.custom_model_max_tokens: "128000"

          # Auto-run tools on every PR
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"
          github_action_config.auto_improve: "true"

          # Trigger on these PR events
          github_action_config.pr_actions: '["opened", "reopened", "ready_for_review", "review_requested"]'
