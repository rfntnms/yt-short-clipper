name: PR Agent (via 9Router)

on:
  pull_request:
    types: [opened, reopened, ready_for_review, review_requested]
  issue_comment:

jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
    name: Run PR Agent on every pull request, respond to user comments
    steps:
      - name: PR Agent action step
        id: pragent
        uses: the-pr-agent/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # 9Router - OpenAI-compatible endpoint
          # NINER_ROUTER_BASE_URL harus berakhiran /v1, contoh: https://your-vps.com/v1
          OPENAI_KEY: ${{ secrets.NINER_ROUTER_API_KEY }}
          OPENAI__API_BASE: ${{ secrets.NINER_ROUTER_BASE_URL }}

          # Model config
          config.model: "openai/cx/gpt-5.5-review"
          config.fallback_models: '["openai/ag/gemini-pro-agent"]'
          config.custom_model_max_tokens: "128000"

          # Fix: gpt-5 class models tidak support temperature != 1
          # drop_params supaya litellm otomatis drop param yang tidak didukung model
          config.temperature: "1"
          LITELLM.DROP_PARAMS: "true"

          # Auto-run tools on every PR
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"
          github_action_config.auto_improve: "true"
          github_action_config.pr_actions: '["opened", "reopened", "ready_for_review", "review_requested"]'
