version: '3.8'

services:
  clipper:
    build: .
    container_name: yt-short-clipper
    ports:
      - "7860:7860"
    volumes:
      - ./output:/app/output
      - ./models:/app/models
      - ./.tmp:/app/.tmp
      - ./config.json:/app/config.json
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
